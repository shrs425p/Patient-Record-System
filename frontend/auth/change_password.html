{% extends 'global/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="clean-panel login-card">
        <div class="login-header">
            <h2>Change Password</h2>
            <p>Update your account password securely.</p>
        </div>

        <form class="form" method="POST" action="{{ url_for('change_password') }}">
            <label>Current Password</label>
            <input type="password" name="current_password" required>

            <label>New Password</label>
            <input type="password" name="new_password" required>

            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required>

            <button class="btn" type="submit">Update Password</button>
            <a href="{{ url_for('dashboard') }}" class="btn secondary" style="width:100%; margin-top: 10px; text-align:center; display:block;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
