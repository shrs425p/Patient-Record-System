{% extends 'global/base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='patients/patients.css') }}">
{% endblock %}

{% block content %}
<section>
    <h1>Edit Patient: {{ patient.name }}</h1>
    <div class="clean-panel form-container">
        <form class="form" method="POST">
            <label>Name</label>
            <input type="text" name="name" value="{{ patient.name }}" required>

            <label>Age</label>
            <input type="number" name="age" value="{{ patient.age }}" required>

            <label>Gender</label>
            <select name="gender" required>
                <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>

            <label>Phone</label>
            <input type="text" name="phone" value="{{ patient.phone or '' }}">

            <label>Address</label>
            <input type="text" name="address" value="{{ patient.address or '' }}">

            <label>Description / About Patient</label>
            <textarea name="description" rows="3">{{ patient.description or '' }}</textarea>

            <button class="btn" type="submit">Update Patient</button>
            <a href="{{ url_for('patients') }}" class="btn secondary" style="width:100%; margin-top: 10px; text-align:center; display:block;">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
